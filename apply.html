  <!-- MAIN CONTENT CHANGES -->

<main class="join-console">

  <section class="console-container">

<!-- LEFT PROGRESSION COLUMN -->
<aside class="console-progress">

  <!-- Vertical Track -->
  <div class="console-progress-track">
    <div class="console-progress-fill" id="consoleProgressFill"></div>
  </div>

  <!-- Phase Items -->
  <div class="console-phases">

    <div class="console-phase active" data-phase="0">
      <span class="phase-dot"></span>
      <span class="phase-label">01 Positioning</span>
    </div>

    <div class="console-phase" data-phase="1">
      <span class="phase-dot"></span>
      <span class="phase-label">02 Role</span>
    </div>

    <div class="console-phase" data-phase="2">
      <span class="phase-dot"></span>
      <span class="phase-label">03 Identity</span>
    </div>

    <div class="console-phase" data-phase="3">
      <span class="phase-dot"></span>
      <span class="phase-label">04 Capability</span>
    </div>

    <div class="console-phase" data-phase="4">
      <span class="phase-dot"></span>
      <span class="phase-label">05 Commitment</span>
    </div>

    <div class="console-phase" data-phase="5">
      <span class="phase-dot"></span>
      <span class="phase-label">06 Review</span>
    </div>

    <div class="console-phase" data-phase="6">
      <span class="phase-dot"></span>
      <span class="phase-label">07 Submission</span>
    </div>

  </div>

</aside>

    <!-- RIGHT PANEL -->
    <section class="console-panel">

      <div class="console-content" id="consoleContent">
        <!-- dynamic content loads here -->
      </div>

      <div class="console-controls">
        <button id="consoleBack" disabled>Back</button>
        <button id="consoleNext">Proceed</button>
      </div>

      <div class="console-status" id="consoleStatus"></div>

    </section>

  </section>

</main>
